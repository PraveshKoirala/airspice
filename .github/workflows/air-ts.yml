name: air-ts

# Parity CI for the TypeScript AIR engine core (packages/air-ts, issue #7).
# Runs on every push to main and every pull request. This is a SEPARATE workflow
# from ci.yml by design (the orchestrator asked for a new file, not an edit to
# ci.yml). The job builds the package under strict TypeScript and runs the full
# Vitest suite, whose parity tests diff air-ts output against the golden corpus
# byte-for-byte. No ngspice / Python is needed -- issue #7 does no simulation.
#
# Workspaces refactor (issue #85): the repo is now an npm workspace root, so
# `npm ci` runs at the root and hoists a single copy of every dep (in
# particular fast-xml-parser, which is what #85 was filed to fix). The
# working-directory stays packages/air-ts for the per-package scripts.
#
# Maintainer note: once green, `air-ts` can be added to the required status
# checks for `main` alongside guardrails / core-py / ui.

on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same ref cancel in-flight runs.
concurrency:
  group: air-ts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  air-ts:
    name: air-ts (build + vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      # Root install: npm workspaces places every hoisted dep under
      # node_modules/, and symlinks packages/{air-ts,agent,sim-wasm,ui} under
      # node_modules/<name>. This is the fix for #85: a single fast-xml-parser
      # copy resolved by npm the standard way (no per-consumer hard-coded
      # alias). All subsequent per-package scripts see this layout.
      - name: Install dependencies (workspaces, root)
        run: npm ci

      # Strict TypeScript build (tsc -b) fails on any type error; also
      # type-checks the test sources against the same strict config.
      - name: Typecheck (src + tests, strict)
        run: npm --workspace air-ts run typecheck

      # `npm run build` == `tsc -b`; emits dist/ and fails on any TS error.
      - name: Build
        run: npm --workspace air-ts run build

      # Full Vitest suite: corpus parity (15 designs x model.json +
      # canonical.air.xml, byte-diff), units table, formatNumber/%.6g,
      # canonicalizer edges, parser leniencies, security limits, the parity
      # harness mutation self-test, and the fuzzer outcome reporter.
      - name: Test (vitest)
        run: npm --workspace air-ts test
